<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - AI Study Planner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="dashboard-nav">
    <div>
      <h2>AI Study Planner</h2>
      <p id="userGreeting">Loading...</p>
    </div>
    <div class="nav-actions">
      <button class="btn btn-outline" id="darkToggle">Dark Mode</button>
      <button class="btn danger" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="dashboard-grid">
    <section class="card span-2">
      <h3>Daily Task Planner</h3>
      <form class="inline-form" id="taskForm">
        <input type="text" id="taskTitle" placeholder="Task title" required />
        <input type="text" id="taskSubject" placeholder="Subject" />
        <input type="date" id="taskDueDate" />
        <button class="btn" type="submit">Add Task</button>
      </form>
      <div id="taskList" class="list"></div>
    </section>

    <section class="card">
      <h3>Attendance Tracker</h3>
      <form id="attendanceForm">
        <input type="text" id="attendanceSubject" placeholder="Subject" required />
        <input type="number" id="totalClasses" placeholder="Total classes" min="0" required />
        <input type="number" id="attendedClasses" placeholder="Attended classes" min="0" required />
        <button class="btn" type="submit">Add Attendance</button>
      </form>
      <div id="attendanceList" class="list"></div>
    </section>

    <section class="card">
      <h3>Upload Notes</h3>
      <form id="noteForm" enctype="multipart/form-data">
        <input type="text" id="noteTitle" placeholder="Note title" required />
        <input type="file" id="noteFile" accept=".pdf,image/*" required />
        <button class="btn" type="submit">Upload Note</button>
      </form>
      <div id="noteList" class="list"></div>
    </section>

    <section class="card span-2">
      <h3>AI Study Suggestions</h3>
      <form id="aiForm" class="ai-form">
        <input type="date" id="examDate" required />
        <input type="text" id="subjects" placeholder="Subjects e.g. DBMS, DSA, OS" required />
        <input type="text" id="weakTopics" placeholder="Weak topics e.g. Joins, Trees, Deadlock" required />
        <button class="btn" type="submit">Generate Plan</button>
      </form>
      <div class="ai-output" id="aiOutput">Your study plan will appear here.</div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
